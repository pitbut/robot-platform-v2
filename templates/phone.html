<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Телефон-мозг робота</title>
<style>
  body { margin:0; background:#000; color:#eee; font-family: sans-serif; text-align:center; }
  video, canvas { width:100%; max-height:60vh; background:#000; }
  #log { font-size:13px; padding:10px; text-align:left; white-space:pre-wrap; }
  button { font-size:18px; padding:14px 24px; margin:10px; border-radius:10px; border:none; background:#2d6cdf; color:#fff; }
</style>
</head>
<body>
<h3>Телефон — GPS / компас / видео</h3>
<button id="startBtn">Начать трансляцию</button>
<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none"></canvas>
<div id="log">Ожидание запуска...</div>

<script>
const log = (t) => document.getElementById('log').textContent = t;

const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}/ws`);
ws.onopen = () => ws.send(JSON.stringify({ type: 'hello', role: 'phone' }));

let heading = null;

// Компас. На iOS требует разрешения через жест пользователя (кнопка ниже).
function startCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') window.addEventListener('deviceorientation', onOrient);
    });
  } else {
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
  }
}

function onOrient(e) {
  // webkitCompassHeading — готовый магнитный курс на iOS (0 = север).
  if (e.webkitCompassHeading !== undefined) {
    heading = e.webkitCompassHeading;
  } else if (e.alpha !== null) {
    // На Android alpha растёт против часовой стрелки от начального положения —
    // приблизительно переводим в компасный азимут (0=север, по часовой).
    heading = (360 - e.alpha) % 360;
  }
}

// GPS
function startGPS() {
  navigator.geolocation.watchPosition(pos => {
    ws.send(JSON.stringify({
      type: 'phone_gps',
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      heading: heading,
      acc: pos.coords.accuracy,
    }));
    log(`GPS: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}
Точность: ${pos.coords.accuracy.toFixed(1)} м
Компас: ${heading != null ? heading.toFixed(0) + '°' : 'нет данных'}`);
  }, err => log('Ошибка GPS: ' + err.message), {
    enableHighAccuracy: true, maximumAge: 1000, timeout: 5000,
  });
}

// Видео — снимаем кадры с задней камеры и шлём JPEG по WebSocket
async function startVideo() {
  const video = document.getElementById('v');
  const canvas = document.getElementById('c');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: 640, height: 480 },
    audio: false,
  });
  video.srcObject = stream;
  canvas.width = 640; canvas.height = 480;
  const ctx = canvas.getContext('2d');

  setInterval(() => {
    if (ws.readyState !== WebSocket.OPEN) return;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
    const base64 = dataUrl.split(',')[1];
    ws.send(JSON.stringify({ type: 'video_frame', data: base64 }));
  }, 300); // ~3 кадра/сек — достаточно для наблюдения, не перегружает канал
}

document.getElementById('startBtn').onclick = async () => {
  startCompass();
  startGPS();
  try {
    await startVideo();
  } catch (e) {
    log('Ошибка камеры: ' + e.message);
  }
  document.getElementById('startBtn').style.display = 'none';
};

// Не даём экрану гаснуть, пока телефон работает как "мозг" робота
navigator.wakeLock && navigator.wakeLock.request('screen').catch(() => {});
</script>
</body>
</html>
