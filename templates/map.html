<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Робот-доставщик — панель оператора</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#111; color:#eee; }
  #layout { display:grid; grid-template-columns: 1fr 380px; height:100vh; }
  #map { height:100%; }
  #side { padding:14px; overflow-y:auto; background:#181818; border-left:1px solid #2a2a2a; }
  h2 { margin:0 0 10px; font-size:16px; color:#8ecbff; }
  .card { background:#222; border-radius:10px; padding:12px; margin-bottom:14px; }
  button { cursor:pointer; border:none; border-radius:8px; padding:8px 12px; font-size:14px; color:#fff; background:#2d6cdf; margin:3px; }
  button.stop { background:#d9403f; }
  button.ghost { background:#333; }
  #video { width:100%; border-radius:8px; background:#000; display:block; min-height:180px; object-fit:cover; }
  .row { display:flex; gap:6px; flex-wrap:wrap; }
  .slider-row { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; }
  input[type=range] { flex:1; }
  #wpList { font-size:13px; max-height:140px; overflow-y:auto; }
  #wpList div { padding:3px 0; border-bottom:1px solid #2a2a2a; }
  #status { font-size:13px; line-height:1.6; }
  .dpad { display:grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap:4px; justify-content:center; }
  .dpad button { margin:0; }
</style>
</head>
<body>
<div id="layout">
  <div id="map"></div>
  <div id="side">
    <div class="card">
      <h2>Видео с телефона</h2>
      <img id="video" alt="нет сигнала"/>
    </div>

    <div class="card">
      <h2>Маршрут</h2>
      <p style="font-size:12px;color:#999;margin:0 0 8px">Кликай по карте — точки добавятся по порядку.</p>
      <div id="wpList"></div>
      <div class="row">
        <button onclick="sendRoute()">Отправить маршрут</button>
        <button class="ghost" onclick="clearRoute()">Очистить</button>
      </div>
      <div class="row">
        <button onclick="navControl('start')">Старт</button>
        <button class="stop" onclick="navControl('stop')">Стоп</button>
      </div>
    </div>

    <div class="card">
      <h2>Гимбал телефона</h2>
      <div class="slider-row">Pan <input type="range" min="0" max="180" value="90" id="pan" oninput="sendGimbal()"></div>
      <div class="slider-row">Tilt <input type="range" min="0" max="180" value="90" id="tilt" oninput="sendGimbal()"></div>
      <div class="slider-row">Roll <input type="range" min="0" max="180" value="90" id="roll" oninput="sendGimbal()"></div>
    </div>

    <div class="card">
      <h2>Ручное управление</h2>
      <div class="dpad">
        <span></span>
        <button onmousedown="drive('forward')" onmouseup="drive('stop')">▲</button>
        <span></span>
        <button onmousedown="drive('left')" onmouseup="drive('stop')">◀</button>
        <button class="stop" onclick="drive('stop')">■</button>
        <button onmousedown="drive('right')" onmouseup="drive('stop')">▶</button>
        <span></span>
        <button onmousedown="drive('back')" onmouseup="drive('stop')">▼</button>
        <span></span>
      </div>
    </div>

    <div class="card">
      <h2>Статус робота</h2>
      <div id="status">нет данных</div>
    </div>
  </div>
</div>

<script>
const map = L.map('map').setView([41.311, 69.279], 16); // Ташкент по умолчанию
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

let waypoints = [];
let wpMarkers = [];
let robotMarker = null;
let phoneMarker = null;

map.on('click', e => {
  waypoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
  const m = L.marker(e.latlng).addTo(map);
  wpMarkers.push(m);
  renderWpList();
});

function renderWpList() {
  const el = document.getElementById('wpList');
  el.innerHTML = waypoints.map((p, i) =>
    `<div>#${i + 1}: ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</div>`).join('') || '<div>Точек нет</div>';
}

function clearRoute() {
  waypoints = [];
  wpMarkers.forEach(m => map.removeLayer(m));
  wpMarkers = [];
  renderWpList();
}

function sendRoute() {
  ws.send(JSON.stringify({ type: 'set_waypoints', points: waypoints }));
}

function navControl(cmd) {
  ws.send(JSON.stringify({ type: 'nav_control', cmd }));
}

function drive(cmd) {
  ws.send(JSON.stringify({ type: 'manual_drive', cmd, speed: 180 }));
}

function sendGimbal() {
  ws.send(JSON.stringify({
    type: 'gimbal',
    pan: +document.getElementById('pan').value,
    tilt: +document.getElementById('tilt').value,
    roll: +document.getElementById('roll').value,
  }));
}

const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}/ws`);

ws.onopen = () => ws.send(JSON.stringify({ type: 'hello', role: 'operator' }));

ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);

  if (msg.type === 'video_frame') {
    document.getElementById('video').src = 'data:image/jpeg;base64,' + msg.data;
  }

  if (msg.type === 'phone_gps') {
    const ll = [msg.lat, msg.lng];
    if (!phoneMarker) {
      phoneMarker = L.circleMarker(ll, { radius: 8, color: '#8ecbff' }).addTo(map);
    } else {
      phoneMarker.setLatLng(ll);
    }
  }

  if (msg.type === 'robot_status' || msg.type === 'nav_progress' || msg.type === 'sensors') {
    const s = document.getElementById('status');
    s.innerHTML = `
      Статус: ${msg.status || '-'}<br>
      Точка: ${msg.wp_index != null ? msg.wp_index + 1 : '-'}<br>
      Дистанция до точки: ${msg.dist_m != null ? msg.dist_m + ' м' : '-'}<br>
      Датчики (л/ц/п): ${msg.sensors ? `${msg.sensors.l} / ${msg.sensors.c} / ${msg.sensors.r} см` : '-'}
    `;
  }
};
</script>
</body>
</html>
