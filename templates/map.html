<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Робот-доставщик — панель оператора</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#111; color:#eee; }
  #layout { display:grid; grid-template-columns: 1fr 380px; height:100vh; }
  #map { height:100%; }
  #side { padding:14px; overflow-y:auto; background:#181818; border-left:1px solid #2a2a2a; }
  h2 { margin:0 0 10px; font-size:16px; color:#8ecbff; }
  .card { background:#222; border-radius:10px; padding:12px; margin-bottom:14px; }
  button { cursor:pointer; border:none; border-radius:8px; padding:8px 12px; font-size:14px; color:#fff; background:#2d6cdf; margin:3px; }
  button.stop { background:#d9403f; }
  button.ghost { background:#333; }
  #video { width:100%; border-radius:8px; background:#000; display:block; min-height:180px; object-fit:cover; }
  .row { display:flex; gap:6px; flex-wrap:wrap; }
  .slider-row { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; }
  input[type=range] { flex:1; }
  #wpList { font-size:13px; max-height:140px; overflow-y:auto; }
  #wpList div { padding:3px 0; border-bottom:1px solid #2a2a2a; }
  #status { font-size:13px; line-height:1.6; }
  .dpad { display:grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap:4px; justify-content:center; }
  .dpad button { margin:0; }
</style>
</head>
<body>
<div id="layout">
  <div id="map"></div>
  <div id="side">
    <div class="card">
      <h2>Видео с телефона</h2>
      <img id="video" alt="нет сигнала"/>
    </div>

    <div class="card">
      <h2>Маршрут</h2>
      <p style="font-size:12px;color:#999;margin:0 0 8px">Кликай по карте — точки добавятся по порядку.</p>
      <div id="wpList"></div>
      <div class="row">
        <button onclick="sendRoute()">Построить маршрут</button>
        <button class="ghost" onclick="clearRoute()">Очистить</button>
      </div>
      <div id="routeInfo" style="font-size:13px;color:#8ecbff;margin:8px 0;"></div>
      <div class="row">
        <button id="confirmBtn" style="display:none;background:#2fa84f" onclick="confirmRoute()">Подтвердить и поехать</button>
      </div>
      <div class="row">
        <button onclick="navControl('start')">Старт</button>
        <button class="stop" onclick="navControl('stop')">Стоп</button>
      </div>
    </div>

    <div class="card">
      <h2>Гимбал телефона</h2>
      <div class="slider-row">Pan <input type="range" min="0" max="180" value="90" id="pan" oninput="sendGimbal()"></div>
      <div class="slider-row">Tilt <input type="range" min="0" max="180" value="90" id="tilt" oninput="sendGimbal()"></div>
      <div class="slider-row">Roll <input type="range" min="0" max="180" value="90" id="roll" oninput="sendGimbal()"></div>
    </div>

    <div class="card">
      <h2>Ручное управление</h2>
      <div class="dpad">
        <span></span>
        <button onmousedown="drive('forward')" onmouseup="drive('stop')">▲</button>
        <span></span>
        <button onmousedown="drive('left')" onmouseup="drive('stop')">◀</button>
        <button class="stop" onclick="drive('stop')">■</button>
        <button onmousedown="drive('right')" onmouseup="drive('stop')">▶</button>
        <span></span>
        <button onmousedown="drive('back')" onmouseup="drive('stop')">▼</button>
        <span></span>
      </div>
    </div>

    <div class="card">
      <h2>Голосовая связь</h2>
      <p style="font-size:12px;color:#999;margin:0 0 8px">Оба выключены по умолчанию — экономят трафик, пока не нужны.</p>
      <div class="row">
        <button id="listenBtn" onclick="toggleListen()">🔊 Слушать: выкл</button>
        <button id="talkBtn" onclick="toggleTalk()">🎤 Говорить: выкл</button>
      </div>
      <div id="talkStatus" style="font-size:12px;color:#999;margin-top:8px;"></div>
    </div>

    <div class="card">
      <h2>Статус робота</h2>
      <div id="status">нет данных</div>
    </div>
  </div>
</div>

<script>
const map = L.map('map').setView([41.311, 69.279], 16); // Ташкент по умолчанию
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

let waypoints = [];
let wpAddresses = [];
let wpMarkers = [];
let routeLine = null;
let previewLine = null;
let robotMarker = null;
let phoneMarker = null;

function redrawRouteLine() {
  if (routeLine) map.removeLayer(routeLine);
  if (waypoints.length > 1) {
    routeLine = L.polyline(waypoints.map(p => [p.lat, p.lng]), { color: '#2d6cdf', weight: 4, dashArray: '8,6' }).addTo(map);
  }
}

map.on('click', e => {
  const idx = waypoints.length;
  waypoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
  wpAddresses.push(null);
  const m = L.marker(e.latlng).addTo(map);
  wpMarkers.push(m);
  renderWpList();
  redrawRouteLine();
  ws.send(JSON.stringify({ type: 'reverse_geocode_request', lat: e.latlng.lat, lng: e.latlng.lng, index: idx }));
});

function renderWpList() {
  const el = document.getElementById('wpList');
  el.innerHTML = waypoints.map((p, i) => {
    const addr = wpAddresses[i];
    const label = addr ? addr : `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)} (ищу адрес...)`;
    return `<div>#${i + 1}: ${label}</div>`;
  }).join('') || '<div>Точек нет</div>';
}

function clearRoute() {
  waypoints = [];
  wpAddresses = [];
  wpMarkers.forEach(m => map.removeLayer(m));
  wpMarkers = [];
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  if (previewLine) { map.removeLayer(previewLine); previewLine = null; }
  document.getElementById('routeInfo').textContent = '';
  document.getElementById('confirmBtn').style.display = 'none';
  renderWpList();
}

function sendRoute() {
  if (previewLine) { map.removeLayer(previewLine); previewLine = null; }
  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('routeInfo').textContent = 'Строю маршрут по тротуарам...';
  ws.send(JSON.stringify({ type: 'set_waypoints', points: waypoints }));
}

function confirmRoute() {
  ws.send(JSON.stringify({ type: 'confirm_route' }));
  document.getElementById('confirmBtn').style.display = 'none';
}

function navControl(cmd) {
  ws.send(JSON.stringify({ type: 'nav_control', cmd }));
}

function drive(cmd) {
  ws.send(JSON.stringify({ type: 'manual_drive', cmd, speed: 180 }));
}

function sendGimbal() {
  ws.send(JSON.stringify({
    type: 'gimbal',
    pan: +document.getElementById('pan').value,
    tilt: +document.getElementById('tilt').value,
    roll: +document.getElementById('roll').value,
  }));
}

// ───────────────────────── Голосовая связь ─────────────────────────
let audioCtx = null;
let nextAudioStart = 0;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

document.addEventListener('click', () => { ensureAudioCtx(); }, { once: true });

// Входящий звук с телефона — сырые PCM16 моно чанки, планируем их подряд без пауз/наложений.
function playPcmChunk(base64Data, sampleRate) {
  const ctx = ensureAudioCtx();
  const raw = atob(base64Data);
  const len = raw.length / 2;
  if (len <= 0) return;
  const float32 = new Float32Array(len);
  for (let i = 0; i < len; i++) {
    const lo = raw.charCodeAt(i * 2);
    const hi = raw.charCodeAt(i * 2 + 1);
    let val = (hi << 8) | lo;
    if (val >= 0x8000) val -= 0x10000;
    float32[i] = val / 32768;
  }
  const buffer = ctx.createBuffer(1, len, sampleRate);
  buffer.copyToChannel(float32, 0);
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);

  const now = ctx.currentTime;
  const startAt = Math.max(now, nextAudioStart);
  source.start(startAt);
  nextAudioStart = startAt + buffer.duration;
}

// Исходящий звук (говорить) — живой поток сырых PCM-чанков через Web Audio API,
// никакой записи и ожидания: чанк снят с микрофона -> сразу ушёл по сети.
let listening = false;
let talking = false;
let talkCtx = null, talkStream = null, talkSource = null, talkProcessor = null;

function toggleListen() {
  listening = !listening;
  ws.send(JSON.stringify({ type: 'listen_control', enabled: listening }));
  document.getElementById('listenBtn').textContent = listening ? '🔊 Слушать: вкл' : '🔊 Слушать: выкл';
}

function toggleTalk() {
  talking = !talking;
  if (talking) {
    startTalkStream();
  } else {
    stopTalkStream();
    ws.send(JSON.stringify({ type: 'talk_control', enabled: false })); // робот должен замолчать сразу
  }
  document.getElementById('talkBtn').textContent = talking ? '🎤 Говорить: вкл' : '🎤 Говорить: выкл';
}

async function startTalkStream() {
  try {
    talkStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    talkCtx = new (window.AudioContext || window.webkitAudioContext)();
    talkSource = talkCtx.createMediaStreamSource(talkStream);
    talkProcessor = talkCtx.createScriptProcessor(4096, 1, 1);
    talkProcessor.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      const pcm16 = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        const s = Math.max(-1, Math.min(1, input[i]));
        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      const bytes = new Uint8Array(pcm16.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      ws.send(JSON.stringify({
        type: 'operator_audio_chunk',
        data: btoa(binary),
        sampleRate: talkCtx.sampleRate,
      }));
    };
    talkSource.connect(talkProcessor);
    talkProcessor.connect(talkCtx.destination);
    ws.send(JSON.stringify({ type: 'talk_control', enabled: true }));
    document.getElementById('talkStatus').textContent = 'В эфире...';
  } catch (e) {
    document.getElementById('talkStatus').textContent = 'Нет доступа к микрофону: ' + e.message;
    talking = false;
    document.getElementById('talkBtn').textContent = '🎤 Говорить: выкл';
  }
}

function stopTalkStream() {
  if (talkProcessor) { talkProcessor.disconnect(); talkProcessor.onaudioprocess = null; talkProcessor = null; }
  if (talkSource) { talkSource.disconnect(); talkSource = null; }
  if (talkStream) { talkStream.getTracks().forEach((t) => t.stop()); talkStream = null; }
  if (talkCtx) { talkCtx.close(); talkCtx = null; }
  document.getElementById('talkStatus').textContent = '';
}

const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}/ws`);

ws.onopen = () => ws.send(JSON.stringify({ type: 'hello', role: 'operator' }));

ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);

  if (msg.type === 'video_frame') {
    document.getElementById('video').src = 'data:image/jpeg;base64,' + msg.data;
  }

  if (msg.type === 'audio_frame') {
    playPcmChunk(msg.data, msg.sampleRate || 16000);
  }

  if (msg.type === 'reverse_geocode_result' && msg.index != null) {
    wpAddresses[msg.index] = msg.address; // может быть null, если ORS не нашёл адрес — тогда останутся координаты
    renderWpList();
  }

  if (msg.type === 'phone_gps') {
    const ll = [msg.lat, msg.lng];
    if (!phoneMarker) {
      phoneMarker = L.circleMarker(ll, { radius: 8, color: '#8ecbff' }).addTo(map);
    } else {
      phoneMarker.setLatLng(ll);
    }
  }

  if (msg.type === 'route_preview') {
    if (previewLine) map.removeLayer(previewLine);
    previewLine = L.polyline(msg.points.map(p => [p.lat, p.lng]), { color: '#2fa84f', weight: 5 }).addTo(map);
    map.fitBounds(previewLine.getBounds(), { padding: [30, 30] });

    const infoEl = document.getElementById('routeInfo');
    if (msg.error) {
      infoEl.innerHTML = '⚠ ' + msg.error;
      infoEl.style.color = '#e0a030';
    } else {
      const distKm = msg.distance_m != null ? (msg.distance_m / 1000).toFixed(2) + ' км' : '?';
      const durMin = msg.duration_s != null ? Math.round(msg.duration_s / 60) + ' мин' : '?';
      let text = `Маршрут: ${distKm}, ~${durMin} пешком. Проверь и подтверди.`;
      if (msg.milestones && msg.milestones.length) {
        text += '\n' + msg.milestones.map((m, i) => `#${i + 1}: ${m.address}`).join('\n');
      }
      infoEl.textContent = text;
      infoEl.style.whiteSpace = 'pre-line';
      infoEl.style.color = '#8ecbff';
    }
    document.getElementById('confirmBtn').style.display = 'inline-block';
  }

  if (msg.type === 'route_confirmed') {
    document.getElementById('routeInfo').textContent = 'Маршрут подтверждён — можно жать "Старт".';
  }

  if (msg.type === 'robot_status' || msg.type === 'nav_progress' || msg.type === 'sensors') {
    const s = document.getElementById('status');
    s.innerHTML = `
      Статус: ${msg.status || '-'}<br>
      Точка: ${msg.wp_index != null ? msg.wp_index + 1 : '-'}<br>
      Дистанция до точки: ${msg.dist_m != null ? msg.dist_m + ' м' : '-'}<br>
      Датчики (л/ц/п): ${msg.sensors ? `${msg.sensors.l} / ${msg.sensors.c} / ${msg.sensors.r} см` : '-'}
    `;
  }
};
</script>
</body>
</html>
